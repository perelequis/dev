<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receita dos Rossetti</title>
    <link rel="icon" type="image/x-icon" href="ico.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .recipe-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .modal {
            backdrop-filter: blur(5px);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-red-50 min-h-screen">

    
    <header class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-6">
            <div class="flex justify-center mb-6">
                <img src="logo.png" alt="Logo Receitas dos Rossetti" class="h-16"> </div>
            
            <div class="max-w-md mx-auto">
                <div class="relative">
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="Busque por receitas... (ex: brownie, bolo, etc.)"
                        class="w-full px-4 py-3 pl-12 border-2 border-orange-200 rounded-full focus:border-orange-400 focus:outline-none text-gray-700"
                    >
                    <div class="absolute left-4 top-1/2 transform -translate-y-1/2">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="flex justify-center gap-4 mt-6">
                <button data-category="Todos" class="filter-btn px-6 py-2 rounded-full font-semibold text-white bg-orange-500 hover:bg-orange-600 transition-colors">Todos</button>
                <button data-category="Doce" class="filter-btn px-6 py-2 rounded-full font-semibold text-gray-700 bg-orange-200 hover:bg-orange-300 transition-colors">Doce</button>
                <button data-category="Salgado" class="filter-btn px-6 py-2 rounded-full font-semibold text-gray-700 bg-orange-200 hover:bg-orange-300 transition-colors">Salgado</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="recipesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
        
        <div id="noResults" class="hidden text-center py-12">
            <div class="text-6xl mb-4">🔍</div>
            <h3 class="text-2xl font-semibold text-gray-600 mb-2">Nenhuma receita encontrada</h3>
            <p class="text-gray-500">Tente buscar com outras palavras-chave ou filtros.</p>
        </div>
    </main>

    <footer class="bg-gradient-to-r from-orange-400 to-red-400 text-white text-center py-4 mt-12">
        <p class="text-sm cursor-pointer hover:text-orange-100 transition-colors" onclick="window.open('https://instagram.com/perelequis', '_blank')">
            © <span id="currentYear"></span> Perelequis - Todos os direitos reservados
        </p>
    </footer>
    <div id="modalOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 modal z-50 flex items-center justify-center p-4">
        <div id="modalContent" class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto fade-in">
            </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>

</body>
</html>
